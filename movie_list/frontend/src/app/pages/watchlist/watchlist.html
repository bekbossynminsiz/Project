<div class="watchlist-page">
  <h1>My Watchlist</h1>

  <p>Watchlist count: {{ watchlistMovies.length }}</p>

  <div *ngIf="watchlistMovies.length > 0; else emptyState">
    <div class="movie-grid">
      <div class="movie-card" *ngFor="let movie of watchlistMovies">

        <!-- Poster -->
        <img
          *ngIf="movie.poster_url; else noPoster"
          [src]="movie.poster_url"
          [alt]="movie.title"
          class="db-poster"
        />

        <ng-template #noPoster>
          <img
            src="https://via.placeholder.com/300x450?text=No+Image"
            [alt]="movie.title"
            class="db-poster"
          />
        </ng-template>

        <!-- Info -->
        <h3>{{ movie.title }}</h3>

        <p>
          <strong>Genre:</strong>
          {{ movie.genre_name || 'No genre' }}
        </p>

        <p>
          <strong>Release:</strong>
          {{ movie.release_date || '—' }}
        </p>

        <!-- Actions -->
        <div class="actions">
          <a [routerLink]="['/movies', movie.id]" class="btn">Details</a>
          <button class="danger" (click)="remove(movie.id)">Remove</button>
        </div>

      </div>
    </div>
  </div>

  <ng-template #emptyState>
    <p>Your watchlist is empty.</p>
  </ng-template>
</div>
